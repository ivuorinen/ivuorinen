---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: PR Lint

on:
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  lint:
    name: PR Lint
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - name: PR Lint
        uses: ivuorinen/actions/pr-lint@63093c338bb1212b41849aba0591766a1c04844e # v2026.06.17
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
